[build]
  publish = "."

# Canonical domain redirects — must come before path-based rules
[[redirects]]
  from = "https://reliable-conkies-700067.netlify.app/*"
  to = "https://syntropyearth.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.syntropyearth.com/*"
  to = "https://syntropyearth.com/:splat"
  status = 301
  force = true

# Clean URLs: serve /services/index.html at /services
[[redirects]]
  from = "/services.html"
  to = "/services"
  status = 301

# Security and caching headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/styles.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"
